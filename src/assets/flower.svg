<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="flower">
  <defs>
    <radialGradient id="petal" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe4ef" />
      <stop offset="100%" stop-color="#d94a78" />
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7b8" />
      <stop offset="100%" stop-color="#f2b705" />
    </radialGradient>
  </defs>

  <g transform="translate(32 32)">
    <ellipse rx="10" ry="18" fill="url(#petal)" transform="rotate(0) translate(0 -16)" />
    <ellipse rx="10" ry="18" fill="url(#petal)" transform="rotate(60) translate(0 -16)" />
    <ellipse rx="10" ry="18" fill="url(#petal)" transform="rotate(120) translate(0 -16)" />
    <ellipse rx="10" ry="18" fill="url(#petal)" transform="rotate(180) translate(0 -16)" />
    <ellipse rx="10" ry="18" fill="url(#petal)" transform="rotate(240) translate(0 -16)" />
    <ellipse rx="10" ry="18" fill="url(#petal)" transform="rotate(300) translate(0 -16)" />
    <circle r="8" fill="url(#center)" />
  </g>
</svg>
